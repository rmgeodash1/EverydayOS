# Custom category definitions
categories:
  Work:
    extensions: [.pdf, .docx, .xlsx, .pptx]
    folder: "💼 Work Documents"
    
  Personal Photos:
    extensions: [.jpg, .jpeg, .png, .heic]
    folder: "📸 Personal Photos"
    max_size_mb: 20
    
  Development:
    extensions: [.py, .js, .ts, .jsx, .tsx, .json, .yaml]
    folder: "💻 Code"

# Schedule automatic organization
schedule:
  enabled: true
  folders:
    - ~/Downloads
    - ~/Desktop
  interval_minutes: 60

# Files to always ignore
ignore:
  - "*.tmp"
  - ".DS_Store"
  - "Thumbs.db"